#set( $symbol_pound = '#' )
#set( $symbol_dollar = '$' )
#set( $symbol_escape = '\' )
server:
  port: 8091

${symbol_pound} 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration
  ${symbol_pound} Jackson 全局配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      indent_output: false
      fail_on_empty_beans: false
    deserialization:
      fail_on_unknown_properties: false
  mvc:
    format:
      date-time: yyyy-MM-dd HH:mm:ss
  web:
    resources:
      add-mappings: true
  ${symbol_pound} 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  ${symbol_pound} 数据库配置；启用时同时删除上面的 autoconfigure.exclude
#  datasource:
#    type: com.zaxxer.hikari.HikariDataSource
#    username: root
#    password: 123456
#    url: jdbc:mariadb://127.0.0.1:3306/my_ddd_project?useUnicode=true&characterEncoding=utf8&autoReconnect=true&serverTimezone=UTC&sslMode=DISABLED
#    driver-class-name: org.mariadb.jdbc.Driver
#    hikari:
#      pool-name: Retail_HikariCP
#      minimum-idle: 0
#      idle-timeout: 180000
#      maximum-pool-size: 25
#      auto-commit: true
#      max-lifetime: 1800000
#      connection-timeout: 30000
#      connection-test-query: SELECT 1
#      initialization-fail-timeout: -1 ${symbol_pound}启动时不因数据库不可达而失败

#mybatis:
#  mapper-locations: classpath:/mybatis/mapper/*.xml
#  config-location: classpath:/mybatis/config/mybatis-config.xml

${symbol_pound} 日志
logging:
  level:
    ${symbol_dollar}{package}: info
    org.springframework: warn
    org.mybatis.spring.mapper: error
  config: classpath:logback-spring.xml

${symbol_pound} 接口文档
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  info:
    title: ${symbol_dollar}{rootArtifactId} 接口文档
    description: DDD 脚手架项目接口文档
    version: 1.0.0
    contact:
      name: StackBug
      email: root@stackbug.dev
